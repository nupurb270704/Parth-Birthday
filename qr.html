<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Floating Hearts -->
<div class="hearts"></div>

<div class="qr-container">

  <!-- Animated Image -->
  <img src="Parth_photo.jpg" class="qr-image">

  <!-- Title -->
  <h1 class="glow fade">Happy Birthday ❤️</h1>

  <!-- Message -->
  <p id="qrText"></p>

</div>

<script>
const message = `Happy Birthday ❤️

Happy Birthday, Parth! 🎉✨

Wishing you a year ahead filled with success, good health, and endless joy. May every step you take bring you closer to your dreams, and may all the hard work and struggles you’ve gone through finally pay off in the most beautiful way.

I truly hope you achieve great heights of success and that your life is filled with happiness, growth, and everything you’ve been working towards. You deserve all the good things coming your way.

Have an amazing birthday and an even more amazing year ahead! 🎂💫`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("qrText").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 25);
  }
}

typeWriter();
</script>

</body>
</html>
